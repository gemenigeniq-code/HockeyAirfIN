<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zewir Hockey Mobile</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #58a6ff; --orange: #f9826c; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        .sidebar { height: 60px; width: 100%; background: var(--side); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 0 10px; box-sizing: border-box; z-index: 10; }
        .profile { display: flex; align-items: center; gap: 10px; background: #21262d; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border); }
        .elo-num { font-weight: 800; color: #fff; }
        .rank-tag { font-size: 12px; font-weight: bold; color: var(--orange); }

        .btn { background: #238636; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-bot { background: transparent; border: 1px solid var(--accent); color: var(--accent); display: none; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; position: relative; }
        #game-view { position: relative; border: 2px solid var(--border); background: #000; width: 95vw; max-width: 800px; aspect-ratio: 8/5; }
        canvas { width: 100%; height: 100%; display: block; background: radial-gradient(circle, #161b22 0%, #000 100%); touch-action: none; }
        .score { font-size: 40px; font-weight: 900; margin: 10px 0; letter-spacing: 10px; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(13,17,23,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align: center; }
        .hidden { display: none !important; }
        #status { font-size: 10px; color: #8b949e; position: absolute; bottom: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile">
            <span class="elo-num" id="elo-display">1000</span>
            <span class="rank-tag" id="rank-display">BRONZE</span>
        </div>
        <button id="search-btn" class="btn" onclick="startSearch()">ONLINE</button>
        <button id="bot-btn" class="btn btn-bot" onclick="startBotGame()">BOT</button>
    </div>

    <div class="main">
        <div class="score" id="score">0 : 0</div>
        <div id="game-view">
            <div id="lobby" class="overlay">
                <h2 id="win-msg" style="font-size: 24px; margin: 0;">ZEWIR HOCKEY</h2>
                <div id="elo-change" style="font-weight: bold; margin: 5px;"></div>
                <button id="re-btn" class="btn hidden" onclick="location.reload()">ЗАНОВО</button>
            </div>
            <canvas id="air" width="800" height="500"></canvas>
        </div>
        <div id="status">Ready</div>
    </div>

<script>
    const canvas = document.getElementById('air'), ctx = canvas.getContext('2d');
    const ROOM_ID = "zewir-global-v101"; 
    let peer = new Peer(), conn, isHost = true, running = false, isBotMode = false, resultProcessed = false;
    
    let myElo = parseInt(localStorage.getItem('zewir_elo')) || 1000;
    const ranks = [{n:"DIAMOND",m:1800,c:"#b9f2ff"},{n:"PLATINUM",m:1500,c:"#e5e4e2"},{n:"GOLD",m:1300,c:"#ffd700"},{n:"SILVER",m:1100,c:"#c0c0c0"},{n:"BRONZE",m:0,c:"#cd7f32"}];

    function updateRank() {
        document.getElementById('elo-display').innerText = myElo;
        const r = ranks.find(x => myElo >= x.m);
        const t = document.getElementById('rank-display');
        t.innerText = r.n; t.style.color = r.c;
    }
    updateRank();

    const puck = { x: 400, y: 250, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 80, y: 250, r: 35, s: 0, lx: 80, ly: 250, cvx: 0, cvy: 0 }; 
    const p2 = { x: 720, y: 250, r: 35, s: 0, lx: 720, ly: 250, cvx: 0, cvy: 0 };

    function startSearch() {
        document.getElementById('search-btn').innerText = "...";
        let c = peer.connect(ROOM_ID);
        let t = setTimeout(() => { c.close(); becomeHost(); }, 2000);
        c.on('open', () => { clearTimeout(t); conn = c; isHost = false; init(); });
    }

    function becomeHost() {
        peer.destroy(); peer = new Peer(ROOM_ID);
        peer.on('open', () => {
            document.getElementById('status').innerText = "WAITING...";
            document.getElementById('bot-btn').style.display = "block";
            peer.on('connection', (c) => { conn = c; isHost = true; init(); });
        });
        peer.on('error', (err) => { if(err.type === 'unavailable-id') startSearch(); });
    }

    function startBotGame() { isBotMode = true; isHost = true; init(); }

    function init() {
        document.getElementById('lobby').classList.add('hidden');
        running = true; if(isHost) resetPuck();
        if(conn) {
            conn.on('data', (d) => {
                if(isHost) { p2.x = d.px; p2.y = d.py; p2.cvx = d.vx; p2.cvy = d.vy; } 
                else { 
                    puck.x = d.bx; puck.y = d.by; p1.x = d.p1x; p1.y = d.p1y; p1.s = d.s1; p2.s = d.s2; 
                    if(d.end) finishGame(d.win);
                }
            });
        }
        loop();
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.vx = (Math.random() > 0.5 ? 9 : -9); puck.vy = (Math.random() - 0.5) * 10;
    }

    // УНИВЕРСАЛЬНОЕ УПРАВЛЕНИЕ (МЫШЬ + ТАЧ)
    function handleInput(clientX, clientY) {
        if(!running) return;
        const rect = canvas.getBoundingClientRect();
        // Масштабируем координаты из экранных в 800x500
        const scaleX = 800 / rect.width;
        const scaleY = 500 / rect.height;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        if(isHost) { p1.x = Math.min(x, 380); p1.y = y; }
        else { p2.x = Math.max(x, 420); p2.y = y; }
    }

    canvas.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', (e) => {
        handleInput(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault(); // Запрет скролла
    }, { passive: false });

    function loop() {
        if(!running) return;
        if(isHost) {
            p1.cvx = p1.x - p1.lx; p1.cvy = p1.y - p1.ly; p1.lx = p1.x; p1.ly = p1.y;
            puck.x += puck.vx; puck.y += puck.vy;
            if(puck.y < 15 || puck.y > 485) puck.vy *= -1;
            if(isBotMode) {
                let tx = (puck.x > 400) ? puck.x + 40 : 730, ty = (puck.x > 350) ? puck.y : 250;
                tx = Math.max(480, Math.min(750, tx));
                let dx = tx - p2.x, dy = ty - p2.y, d = Math.sqrt(dx*dx+dy*dy);
                if(d > 1) { p2.x += (dx/d)*Math.min(d*0.1, 8); p2.y += (dy/d)*Math.min(d*0.1, 8); }
            }
            [p1, p2].forEach(p => {
                let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < puck.r + p.r) {
                    let a = Math.atan2(dy, dx), s = Math.max(10, 9 + Math.sqrt(p.cvx**2+p.cvy**2)*0.5);
                    puck.vx = Math.cos(a)*Math.min(s, 22); puck.vy = Math.sin(a)*Math.min(s, 22);
                    puck.x = p.x + Math.cos(a)*(puck.r+p.r+2);
                }
            });
            if (Math.sqrt(puck.vx**2+puck.vy**2) < 7) { puck.vx *= 1.02; puck.vy *= 1.02; }
            if(puck.x < 0) { p2.s++; resetPuck(); checkWin(); }
            if(puck.x > 800) { p1.s++; resetPuck(); checkWin(); }
            if(!isBotMode && conn) conn.send({ bx: puck.x, by: puck.y, p1x: p1.x, p1y: p1.y, s1: p1.s, s2: p2.s });
        } else if(conn) {
            let vx = p2.x - p2.lx, vy = p2.y - p2.ly; p2.lx = p2.x; p2.ly = p2.y;
            conn.send({ px: p2.x, py: p2.y, vx: vx, vy: vy });
        }
        document.getElementById('score').innerText = `${p1.s} : ${p2.s}`;
        draw(); requestAnimationFrame(loop);
    }

    function checkWin() {
        if(p1.s >= 5 || p2.s >= 5) {
            let win = p1.s >= 5;
            if(!isBotMode && conn) conn.send({ end: true, win: !win });
            finishGame(win);
        }
    }

    function finishGame(win) {
        if(resultProcessed) return; resultProcessed = true;
        running = false;
        let change = win ? 25 : -15;
        myElo = Math.max(0, myElo + change);
        localStorage.setItem('zewir_elo', myElo);
        updateRank();
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('win-msg').innerText = win ? "ПОБЕДА!" : "ПРОИГРЫШ";
        document.getElementById('elo-change').innerText = win ? `+${change} RP` : `${change} RP`;
        document.getElementById('elo-change').style.color = win ? "#238636" : "#f9826c";
        document.getElementById('re-btn').classList.remove('hidden');
    }

    function draw() {
        ctx.clearRect(0,0,800,500);
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.strokeRect(400,0,1,500);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#f9826c"; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#58a6ff"; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, 7); ctx.fill();
    }
</script>
</body>
</html>
