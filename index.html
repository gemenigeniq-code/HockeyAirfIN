<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zewir Hockey Global</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #58a6ff; --orange: #f9826c; }
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #c9d1d9; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .btn { background: #238636; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-bot { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        canvas { background: #000; border: 4px solid var(--border); border-radius: 15px; max-width: 95%; height: auto; cursor: none; }
        
        .overlay { position: absolute; inset: 0; background: rgba(13,17,23,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .hidden { display: none !important; }
        #room-id-display { font-size: 12px; color: var(--accent); margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:white; font-style:italic">ZEWIR PRO</h2>
        <div id="elo-box" style="margin: 20px 0; border: 1px solid #333; padding: 10px; border-radius: 8px;">
            <div style="font-size: 10px;">GLOBAL ELO</div>
            <div id="elo-num" style="font-size: 24px; font-weight: 900;">1000</div>
        </div>
        
        <button class="btn" onclick="startOnline()">ИГРАТЬ ONLINE</button>
        <button class="btn btn-bot" onclick="startBot()">ТРЕНИРОВКА (БОТ)</button>
        <div id="status" style="font-size: 11px; margin-top: 10px; color: #8b949e;">Готов к подключению</div>
        <div id="room-id-display" onclick="copyID()"></div>
    </div>

    <div class="main">
        <div id="score" style="font-size: 40px; font-weight: 900; margin-bottom: 10px;">0 : 0</div>
        
        <div id="lobby" class="overlay">
            <h1 id="m-title">ZEWIR HOCKEY</h1>
            <p id="m-desc">Глобальный мультиплеер</p>
            <button id="re-btn" class="btn hidden" style="width: 150px; margin-top: 20px;" onclick="location.reload()">В МЕНЮ</button>
        </div>

        <canvas id="game" width="800" height="500"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    let peer, conn, isHost = false, running = false, isBot = false;
    let myID = "zewir_" + Math.floor(Math.random() * 9999); // Уникальный ID игрока

    let elo = parseInt(localStorage.getItem('z_elo')) || 1000;
    document.getElementById('elo-num').innerText = elo;

    const puck = { x: 400, y: 250, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 100, y: 250, r: 35, s: 0, lx: 100, ly: 250 }; 
    const p2 = { x: 700, y: 250, r: 35, s: 0, lx: 700, ly: 250 };

    function startOnline() {
        document.getElementById('status').innerText = "Подключение к сети...";
        peer = new Peer(myID); // Регистрируем тебя в сети под уникальным ID

        peer.on('open', (id) => {
            document.getElementById('room-id-display').innerText = "Твой ID: " + id + " (клик - копировать)";
            // Пробуем найти "Глобальную комнату"
            let c = peer.connect("zewir_global_room");
            let t = setTimeout(() => { c.close(); becomeHost(); }, 2000);

            c.on('open', () => {
                clearTimeout(t); conn = c; isHost = false; 
                initGame();
            });
        });

        peer.on('error', (err) => { if(err.type === 'unavailable-id') becomeHost(); });
    }

    function becomeHost() {
        if(peer && !peer.destroyed) peer.destroy();
        peer = new Peer("zewir_global_room"); // Становимся главным хостом
        peer.on('open', () => {
            document.getElementById('status').innerText = "Ждем противника...";
            peer.on('connection', (c) => { conn = c; isHost = true; initGame(); });
        });
    }

    function startBot() { isBot = true; isHost = true; initGame(); }

    function initGame() {
        document.getElementById('lobby').classList.add('hidden');
        running = true; if(isHost) resetPuck();
        if(conn) {
            conn.on('data', d => {
                if(isHost) { p2.x = d.x; p2.y = d.y; }
                else { 
                    puck.x = d.bx; puck.y = d.by; p1.x = d.p1x; p1.y = d.p1y; 
                    p1.s = d.s1; p2.s = d.s2;
                    if(d.win !== undefined) finish(d.win);
                }
            });
        }
        loop();
    }

    function resetPuck() { puck.x = 400; puck.y = 250; puck.vx = isHost?8:-8; puck.vy = (Math.random()-0.5)*10; }

    function input(ex, ey) {
        if(!running) return;
        const r = canvas.getBoundingClientRect();
        const x = (ex - r.left) * (800 / r.width), y = (ey - r.top) * (500 / r.height);
        if(isHost) { p1.x = Math.min(x, 380); p1.y = y; }
        else { p2.x = Math.max(x, 420); p2.y = y; }
    }

    canvas.addEventListener('mousemove', e => input(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', e => { input(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});

    function loop() {
        if(!running) return;
        if(isHost) {
            let v1x = p1.x - p1.lx, v1y = p1.y - p1.ly; p1.lx = p1.x; p1.ly = p1.y;
            if(isBot) {
                // БОТ ИЗ ТВОЕЙ ПРОСЬБЫ (УЛУЧШЕННЫЙ)
                let targetY = (puck.x > 400) ? puck.y : 250;
                let targetX = (puck.x > 500) ? puck.x + 20 : 720;
                p2.y += (targetY - p2.y) * 0.15;
                p2.x += (targetX - p2.x) * 0.15;
                p2.x = Math.max(450, Math.min(760, p2.x));
            }
            let v2x = p2.x - p2.lx, v2y = p2.y - p2.ly; p2.lx = p2.x; p2.ly = p2.y;

            puck.x += puck.vx; puck.y += puck.vy;
            if(puck.y < 15 || puck.y > 485) { puck.vy *= -1; puck.y = (puck.y < 15)?15:485; }

            [p1, p2].forEach(p => {
                let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < puck.r + p.r) {
                    let a = Math.atan2(dy, dx);
                    puck.vx = Math.cos(a) * 15; puck.vy = Math.sin(a) * 15;
                    puck.x = p.x + Math.cos(a) * (puck.r + p.r + 2);
                }
            });

            if(puck.x < 0) { p2.s++; resetPuck(); checkWin(); }
            if(puck.x > 800) { p1.s++; resetPuck(); checkWin(); }
            if(conn) conn.send({ bx: puck.x, by: puck.y, p1x: p1.x, p1y: p1.y, s1: p1.s, s2: p2.s });
        } else if(conn) {
            conn.send({ x: p2.x, y: p2.y });
        }
        document.getElementById('score').innerText = p1.s + " : " + p2.s;
        draw(); requestAnimationFrame(loop);
    }

    function checkWin() {
        if(p1.s >= 5 || p2.s >= 5) {
            let win = p1.s >= 5;
            if(conn) conn.send({ win: !win });
            finish(win);
        }
    }

    function finish(win) {
        running = false;
        elo += win ? 25 : -15; localStorage.setItem('z_elo', elo);
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('m-title').innerText = win ? "ПОБЕДА!" : "ПРОИГРЫШ";
        document.getElementById('re-btn').classList.remove('hidden');
    }

    function draw() {
        ctx.clearRect(0,0,800,500);
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.strokeRect(400, 0, 1, 500);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#f9826c"; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#58a6ff"; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, 7); ctx.fill();
    }

    function copyID() { navigator.clipboard.writeText(myID); alert("ID скопирован!"); }
</script>
</body>
</html>
