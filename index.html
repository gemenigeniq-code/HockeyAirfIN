<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zewir Hockey: Three Cats Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #1c2128; --accent: #ff9500; --blue: #58a6ff; --red: #ff4b4b; --text: #adbac7; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Новый Интерфейс */
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #30363d; }
        .stats { display: flex; gap: 20px; }
        .stat-card { background: #22272e; padding: 5px 15px; border-radius: 8px; border: 1px solid #444; }
        .stat-card span { color: var(--accent); font-weight: bold; }

        .game-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        
        /* Выбор персонажа */
        #char-select { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .char-grid { display: flex; gap: 20px; margin-top: 20px; }
        .char-card { background: var(--panel); border: 2px solid #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; width: 120px; }
        .char-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .char-card img { font-size: 50px; display: block; margin-bottom: 10px; }
        .char-card b { display: block; color: #fff; }
        .char-card i { font-size: 11px; color: #888; }

        /* Таблица лидеров */
        .leaderboard { width: 250px; background: var(--panel); border-left: 2px solid #30363d; padding: 15px; font-size: 14px; }
        .leader-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }

        canvas { flex: 1; background: radial-gradient(circle, #1c2128 0%, #000 100%); cursor: none; }
        
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 150; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px; }
        .hidden { display: none !important; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 50px; font-weight: 900; pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <div class="stat-card">ELO: <span id="elo-val">1000</span></div>
            <div id="status" style="font-size: 12px; align-self: center;">Выберите кота</div>
        </div>
        <div>
            <button class="btn" style="padding: 5px 15px;" onclick="location.reload()">МЕНЮ</button>
        </div>
    </div>

    <div class="game-container">
        <div id="char-select">
            <h1>КТО ТЫ СЕГОДНЯ?</h1>
            <div class="char-grid">
                <div class="char-card" onclick="chooseChar('korzhik')"><span>🐱🍊</span><b>КОРЖИК</b><i>Скорость ++</i></div>
                <div class="char-card" onclick="chooseChar('caramel')"><span>🐱🎀</span><b>КАРАМЕЛЬКА</b><i>Радиус ++</i></div>
                <div class="char-card" onclick="chooseChar('compote')"><span>🐱🍏</span><b>КОМПОТ</b><i>Сила ++</i></div>
            </div>
        </div>

        <div id="score">0 : 0</div>
        
        <div id="lobby" class="overlay hidden">
            <h1 id="win-msg">МАТЧ ОКОНЧЕН</h1>
            <p id="elo-change"></p>
            <button class="btn" onclick="startSearch()">ИГРАТЬ СНОВА</button>
        </div>

        <canvas id="air"></canvas>

        <div class="leaderboard">
            <h3>🏆 ЛИДЕРЫ</h3>
            <div id="leader-list"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('air'), ctx = canvas.getContext('2d');
    const ROOM_ID = "zewir-cats-v105"; 
    let peer, conn, isHost = true, running = false, char = 'korzhik', resultProcessed = false;
    
    // Настройки персонажей (БУСТЫ)
    const charData = {
        korzhik: { img: '🐱', speed: 1.2, radius: 35, power: 0.5 },
        caramel: { img: '🐱', speed: 1.0, radius: 45, power: 0.5 },
        compote: { img: '🐱', speed: 0.9, radius: 35, power: 0.8 }
    };

    let myElo = parseInt(localStorage.getItem('zewir_elo')) || 1000;
    document.getElementById('elo-val').innerText = myElo;

    function saveScore() {
        let history = JSON.parse(localStorage.getItem('zewir_history') || '[]');
        history.push({ elo: myElo, date: new Date().toLocaleDateString() });
        history.sort((a,b) => b.elo - a.elo);
        localStorage.setItem('zewir_history', JSON.stringify(history.slice(0, 5)));
        renderLeaders();
    }

    function renderLeaders() {
        const list = JSON.parse(localStorage.getItem('zewir_history') || '[]');
        document.getElementById('leader-list').innerHTML = list.map(i => `<div class="leader-item"><span>${i.date}</span><b>${i.elo}</b></div>`).join('');
    }
    renderLeaders();

    const puck = { x: 400, y: 250, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 80, y: 250, r: 35, s: 0, lx: 80, ly: 250, cvx: 0, cvy: 0, c: 'korzhik' }; 
    const p2 = { x: 720, y: 250, r: 35, s: 0, lx: 720, ly: 250, cvx: 0, cvy: 0, c: 'compote' };

    function chooseChar(c) {
        char = c;
        document.getElementById('char-select').classList.add('hidden');
        startPeer();
    }

    function startPeer() {
        peer = new Peer();
        peer.on('open', () => startSearch());
        peer.on('error', becomeHost);
    }

    function startSearch() {
        document.getElementById('status').innerText = "ПОИСК...";
        let c = peer.connect(ROOM_ID);
        let t = setTimeout(becomeHost, 2000);
        c.on('open', () => { clearTimeout(t); conn = c; isHost = false; init(); });
    }

    function becomeHost() {
        if(peer && !peer.destroyed) peer.destroy();
        peer = new Peer(ROOM_ID);
        peer.on('open', () => {
            document.getElementById('status').innerText = "ЖДЕМ ИГРОКА...";
            peer.on('connection', (c) => { conn = c; isHost = true; init(); });
        });
    }

    function init() {
        document.getElementById('lobby').classList.add('hidden');
        running = true; resultProcessed = false;
        if(isHost) { p1.s = 0; p2.s = 0; resetPuck(); }
        conn.on('data', (d) => {
            if(isHost) { p2.x = d.x; p2.y = d.y; p2.cvx = d.vx; p2.cvy = d.vy; p2.c = d.c; } 
            else { 
                puck.x = d.bx; puck.y = d.by; p1.x = d.p1x; p1.y = d.p1y; p1.s = d.s1; p2.s = d.s2; 
                p1.c = d.c1; p2.c = d.c2;
                if(d.end) finishGame(d.win);
            }
        });
        resize(); loop();
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.vx = (Math.random() > 0.5 ? 8 : -8); puck.vy = (Math.random() - 0.5) * 10;
    }

    function loop() {
        if(!running) return;
        if(isHost) {
            let config = charData[p1.c];
            puck.x += puck.vx; puck.y += puck.vy;
            if(puck.y < 15 || puck.y > 485) puck.vy *= -1;

            [p1, p2].forEach(p => {
                let pConf = charData[p.c];
                let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < puck.r + pConf.radius) {
                    let a = Math.atan2(dy, dx), s = 10 + Math.sqrt(p.cvx**2+p.cvy**2) * pConf.power;
                    puck.vx = Math.cos(a) * Math.min(s, 25); puck.vy = Math.sin(a) * Math.min(s, 25);
                    puck.x = p.x + Math.cos(a) * (puck.r + pConf.radius + 2);
                }
            });

            if(puck.x < 0) { p2.s++; resetPuck(); checkWin(); }
            if(puck.x > 800) { p1.s++; resetPuck(); checkWin(); }
            
            conn.send({ bx: puck.x, by: puck.y, p1x: p1.x, p1y: p1.y, s1: p1.s, s2: p2.s, c1: p1.c, c2: p2.c });
        } else {
            let vx = (p2.x - p2.lx), vy = (p2.y - p2.ly);
            p2.lx = p2.x; p2.ly = p2.y;
            conn.send({ x: p2.x, y: p2.y, vx: vx, vy: vy, c: char });
        }
        
        // Плавность для Хоста
        if(isHost) { p1.cvx = (p1.x - p1.lx); p1.cvy = (p1.y - p1.ly); p1.lx = p1.x; p1.ly = p1.y; }

        document.getElementById('score').innerText = `${p1.s} : ${p2.s}`;
        draw(); requestAnimationFrame(loop);
    }

    function checkWin() {
        if(p1.s >= 5 || p2.s >= 5) {
            let win = p1.s >= 5;
            conn.send({ end: true, win: !win });
            finishGame(win);
        }
    }

    function finishGame(win) {
        if(resultProcessed) return; resultProcessed = true;
        running = false;
        let change = win ? 25 : -15;
        myElo = Math.max(0, myElo + change);
        localStorage.setItem('zewir_elo', myElo);
        saveScore();
        document.getElementById('elo-val').innerText = myElo;
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('win-msg').innerText = win ? "ПОБЕДА!" : "ПРОИГРЫШ";
        document.getElementById('elo-change').innerText = win ? `+${change} RP` : `${change} RP`;
    }

    function draw() {
        ctx.clearRect(0,0,800,500);
        // Поле
        ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 5;
        ctx.strokeRect(0,0,800,500); ctx.beginPath(); ctx.moveTo(400,0); ctx.lineTo(400,500); ctx.stroke();
        
        // Шайба
        ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;

        // Игроки
        drawPlayer(p1, "#ff9500");
        drawPlayer(p2, "#58a6ff");
    }

    function drawPlayer(p, col) {
        let conf = charData[p.c] || charData.korzhik;
        ctx.fillStyle = col; ctx.beginPath(); ctx.arc(p.x, p.y, conf.radius, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "30px Arial"; ctx.textAlign = "center";
        ctx.fillText(conf.img, p.x, p.y + 10);
    }

    function handleInput(ex, ey) {
        if(!running) return;
        const r = canvas.getBoundingClientRect();
        const x = (ex - r.left) * (800 / r.width), y = (ey - r.top) * (500 / r.height);
        if(isHost) { p1.x = Math.min(x, 370); p1.y = y; p1.c = char; }
        else { p2.x = Math.max(x, 430); p2.y = y; }
    }

    window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
    window.onresize = resize;
    function resize() { canvas.width = 800; canvas.height = 500; }
</script>
</body>
</html>
