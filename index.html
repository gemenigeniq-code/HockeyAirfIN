<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zewir Hockey: Human Bot Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #58a6ff; --orange: #f9826c; --text: #c9d1d9; }
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .profile { background: #21262d; border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .elo-num { font-size: 34px; font-weight: 800; color: #fff; margin: 5px 0; }
        .rank-tag { font-size: 13px; font-weight: bold; color: var(--orange); }

        .char-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .char-btn { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 10px 0; cursor: pointer; text-align: center; transition: 0.2s; }
        .char-btn.active { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); transform: scale(1.05); }
        .char-btn span { font-size: 24px; display: block; }

        .btn { background: #238636; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-bot { background: #1f6feb; }
        
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #game-view { position: relative; border: 4px solid var(--border); border-radius: 20px; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); width: 95%; max-width: 800px; }
        canvas { display: block; width: 100%; height: auto; background: radial-gradient(circle, #161b22 0%, #000 100%); border-radius: 16px; }
        
        .score { font-size: 50px; font-weight: 900; margin-bottom: 10px; letter-spacing: 15px; }
        .overlay { position: absolute; inset: 0; background: rgba(13,17,23,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius: 16px; text-align: center; }
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
            .score { font-size: 30px; margin-top: 5px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="profile">
            <div style="font-size: 10px; color: var(--accent);">РЕЙТИНГ</div>
            <div class="elo-num" id="elo-display">1000</div>
            <div class="rank-tag" id="rank-display">BRONZE</div>
        </div>

        <div style="font-size: 11px; margin-bottom: 10px; color: #8b949e;">ВЫБЕРИ ГЕРОЯ:</div>
        <div class="char-selector">
            <div class="char-btn active" onclick="setChar(this, '🐱')"><span>🐱</span></div>
            <div class="char-btn" onclick="setChar(this, '🎀')"><span>🎀</span></div>
            <div class="char-btn" onclick="setChar(this, '🍏')"><span>🍏</span></div>
        </div>

        <button class="btn btn-bot" onclick="startBotGame()">ИГРАТЬ С БОТОМ</button>
        <button id="search-btn" class="btn" onclick="startSearch()">ОНЛАЙН МАТЧ</button>
        <div id="status" style="font-size: 12px; color: #8b949e; text-align: center;">Готов к игре!</div>
    </div>

    <div class="main">
        <div class="score" id="score">0 : 0</div>
        <div id="game-view">
            <div id="lobby" class="overlay">
                <h2 id="win-msg" style="font-size: 36px; margin: 0;">ZEWIR HOCKEY</h2>
                <p id="msg-p" style="color: #8b949e;">Первым до 5 голов</p>
                <div id="elo-change" style="font-weight: bold; margin: 10px; font-size: 20px;"></div>
                <button id="re-btn" class="btn hidden" onclick="location.reload()" style="width: 160px;">В МЕНЮ</button>
            </div>
            <canvas id="air" width="800" height="500"></canvas>
        </div>
    </div>

<script>
    const canvas = document.getElementById('air'), ctx = canvas.getContext('2d');
    const ROOM_ID = "zewir-global-lobby-v99"; 
    let peer, conn, isHost = true, running = false, isBotMode = false;
    let myEmoji = '🐱';

    let myElo = parseInt(localStorage.getItem('zewir_elo')) || 1000;
    const ranks = [{n:"DIAMOND",m:1800,c:"#b9f2ff"},{n:"PLATINUM",m:1500,c:"#e5e4e2"},{n:"GOLD",m:1300,c:"#ffd700"},{n:"SILVER",m:1100,c:"#c0c0c0"},{n:"BRONZE",m:0,c:"#cd7f32"}];

    function updateRank() {
        document.getElementById('elo-display').innerText = myElo;
        const r = ranks.find(x => myElo >= x.m) || ranks[ranks.length-1];
        const t = document.getElementById('rank-display');
        t.innerText = r.n; t.style.color = r.c;
    }
    updateRank();

    function setChar(el, emoji) {
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        myEmoji = emoji;
    }

    const puck = { x: 400, y: 250, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 80, y: 250, r: 35, s: 0, lx: 80, ly: 250, cvx: 0, cvy: 0, em: '🐱' }; 
    const p2 = { x: 720, y: 250, r: 35, s: 0, lx: 720, ly: 250, cvx: 0, cvy: 0, em: '🍏' };

    function startSearch() {
        if(!peer) peer = new Peer();
        document.getElementById('search-btn').innerText = "ПОИСК...";
        let c = peer.connect(ROOM_ID);
        let t = setTimeout(() => { c.close(); becomeHost(); }, 2000);
        c.on('open', () => { clearTimeout(t); conn = c; isHost = false; init(); });
    }

    function becomeHost() {
        if(peer && !peer.destroyed) peer.destroy();
        peer = new Peer(ROOM_ID);
        peer.on('open', () => {
            document.getElementById('status').innerText = "ОЖИДАНИЕ ИГРОКА...";
            peer.on('connection', (c) => { conn = c; isHost = true; init(); });
        });
    }

    function startBotGame() { isBotMode = true; isHost = true; init(); }

    function init() {
        document.getElementById('lobby').classList.add('hidden');
        running = true; 
        if(isHost) { p1.em = myEmoji; resetPuck(); } else { p2.em = myEmoji; }
        if(conn) {
            conn.on('data', (d) => {
                if(isHost) { p2.x = d.px; p2.y = d.py; p2.cvx = d.vx; p2.cvy = d.vy; p2.em = d.em; } 
                else { 
                    puck.x = d.bx; puck.y = d.by; p1.x = d.p1x; p1.y = d.p1y; p1.s = d.s1; p2.s = d.s2; p1.em = d.em;
                    if(d.end) finishGame(d.win);
                }
            });
        }
        loop();
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.vx = (Math.random() > 0.5 ? 9 : -9); puck.vy = (Math.random() - 0.5) * 10;
    }

    function handleInput(ex, ey) {
        if(!running) return;
        const r = canvas.getBoundingClientRect();
        const scX = 800 / r.width, scY = 500 / r.height;
        const x = (ex - r.left) * scX, y = (ey - r.top) * scY;
        if(isHost) { p1.x = Math.min(x, 380); p1.y = y; }
        else { p2.x = Math.max(x, 420); p2.y = y; }
    }

    canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});

    function loop() {
        if(!running) return;
        if(isHost) {
            p1.cvx = p1.x - p1.lx; p1.cvy = p1.y - p1.ly; p1.lx = p1.x; p1.ly = p1.y;
            puck.x += puck.vx; puck.y += puck.vy;
            if(puck.y < 15 || puck.y > 485) { puck.vy *= -1; puck.y = (puck.y < 15) ? 15 : 485; }
            
            if(isBotMode) {
                // ПЛАВНАЯ ЛОГИКА БОТА
                let reactionSpeed = 0.09; 
                let targetX, targetY;
                if (puck.x > 320) { 
                    targetX = puck.x + 35; 
                    targetY = puck.y;
                } else {
                    targetX = 720;
                    targetY = 250;
                }
                targetX = Math.max(450, Math.min(760, targetX));
                p2.x += (targetX - p2.x) * reactionSpeed; 
                p2.y += (targetY - p2.y) * reactionSpeed;
                p2.cvx = p2.x - p2.lx; p2.cvy = p2.y - p2.ly;
                p2.lx = p2.x; p2.ly = p2.y;
            }

            [p1, p2].forEach(p => {
                let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < puck.r + p.r) {
                    let a = Math.atan2(dy, dx), s = Math.max(10, 9 + Math.sqrt(p.cvx**2+p.cvy**2)*0.6);
                    puck.vx = Math.cos(a)*Math.min(s, 22); puck.vy = Math.sin(a)*Math.min(s, 22);
                    puck.x = p.x + Math.cos(a)*(puck.r+p.r+2);
                }
            });
            if(puck.x < 0) { p2.s++; resetPuck(); checkWin(); }
            if(puck.x > 800) { p1.s++; resetPuck(); checkWin(); }
            if(!isBotMode && conn) conn.send({ bx: puck.x, by: puck.y, p1x: p1.x, p1y: p1.y, s1: p1.s, s2: p2.s, em: p1.em });
        } else if(conn) {
            let vx = p2.x - p2.lx, vy = p2.y - p2.ly; p2.lx = p2.x; p2.ly = p2.y;
            conn.send({ px: p2.x, py: p2.y, vx: vx, vy: vy, em: myEmoji });
        }
        document.getElementById('score').innerText = `${p1.s} : ${p2.s}`;
        draw(); requestAnimationFrame(loop);
    }

    function checkWin() {
        if(p1.s >= 5 || p2.s >= 5) {
            let win = p1.s >= 5;
            if(!isBotMode && conn) conn.send({ end: true, win: !win });
            finishGame(win);
        }
    }

    function finishGame(win) {
        running = false;
        let change = win ? 25 : -15;
        myElo = Math.max(0, myElo + change);
        localStorage.setItem('zewir_elo', myElo);
        updateRank();
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('win-msg').innerText = win ? "ПОБЕДА!" : "ПРОИГРЫШ";
        document.getElementById('elo-change').innerText = (win ? "+" : "") + change + " RP";
        document.getElementById('elo-change').style.color = win ? "#238636" : "#f9826c";
        document.getElementById('re-btn').classList.remove('hidden');
    }

    function draw() {
        ctx.clearRect(0,0,800,500);
        ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.strokeRect(400,0,1,500);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
        [[p1, "#f9826c"], [p2, "#58a6ff"]].forEach(([p, col]) => {
            ctx.fillStyle = col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "32px Arial"; ctx.textAlign = "center";
            ctx.fillText(p.em, p.x, p.y + 12);
        });
    }
</script>
</body>
</html>
